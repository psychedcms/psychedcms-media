parameters:
    env(MEDIA_STORAGE_QUOTA): '0'
    psychedcms_media.default_bucket: 'hilo-media'
    env(MEDIA_MAX_IMAGE_SIZE): '10485760'
    env(MEDIA_MAX_VIDEO_SIZE): '209715200'
    env(MEDIA_MAX_AUDIO_SIZE): '52428800'
    env(MEDIA_MAX_DOCUMENT_SIZE): '20971520'
    psychedcms_media.allowed_types: []

services:
    _defaults:
        autowire: true
        autoconfigure: true

    PsychedCms\Media\:
        resource: '../src/'
        exclude:
            - '../src/Entity/'
            - '../src/PsychedCmsMediaBundle.php'

    PsychedCms\Media\Repository\MediaRepositoryInterface:
        alias: PsychedCms\Media\Repository\MediaRepository

    PsychedCms\Media\Repository\MediaCategoryRepositoryInterface:
        alias: PsychedCms\Media\Repository\MediaCategoryRepository

    PsychedCms\Media\Service\FileValidator:
        arguments:
            $allowedTypes: '%psychedcms_media.allowed_types%'
            $maxSizes:
                image: '%env(int:MEDIA_MAX_IMAGE_SIZE)%'
                video: '%env(int:MEDIA_MAX_VIDEO_SIZE)%'
                audio: '%env(int:MEDIA_MAX_AUDIO_SIZE)%'
                document: '%env(int:MEDIA_MAX_DOCUMENT_SIZE)%'

    PsychedCms\Media\Service\FileValidatorInterface:
        alias: PsychedCms\Media\Service\FileValidator

    PsychedCms\Media\Service\UploadPathResolverInterface:
        alias: PsychedCms\Media\Service\UploadPathResolver

    PsychedCms\Media\Service\ExifExtractorInterface:
        alias: PsychedCms\Media\Service\ExifExtractor

    PsychedCms\Media\Service\StorageStatsProviderInterface:
        alias: PsychedCms\Media\Service\StorageStatsProvider

    PsychedCms\Media\Service\OrphanedFileDetectorInterface:
        alias: PsychedCms\Media\Service\OrphanedFileDetector

    PsychedCms\Media\Service\ImageOptimizerInterface:
        alias: PsychedCms\Media\Service\ImageOptimizer

    PsychedCms\Media\State\MediaUploadProcessor:
        arguments:
            $defaultStorage: '@default.storage'
            $storageQuota: '%env(int:MEDIA_STORAGE_QUOTA)%'
            $storageLocator: '@psychedcms.storage.locator'

    PsychedCms\Media\State\MediaDeleteProcessor:
        arguments:
            $defaultStorage: '@default.storage'

    PsychedCms\Media\State\MediaReplaceProcessor:
        arguments:
            $defaultStorage: '@default.storage'

    PsychedCms\Media\State\MediaBulkDeleteProcessor:
        arguments:
            $defaultStorage: '@default.storage'

    PsychedCms\Media\Service\OrphanedFileDetector:
        arguments:
            $defaultStorage: '@default.storage'

    PsychedCms\Media\Service\ImageOptimizer:
        arguments:
            $defaultStorage: '@default.storage'
            $enableWebp: true
            $enableAvif: false
            $quality: 85

    PsychedCms\Media\Service\StorageStatsProvider:
        arguments:
            $storageQuota: '%env(int:MEDIA_STORAGE_QUOTA)%'

    PsychedCms\Media\Serializer\MediaUrlNormalizer:
        arguments:
            $imgproxyUrl: '%env(default::IMGPROXY_URL)%'
            $mediaPublicUrl: '%env(default::MEDIA_PUBLIC_URL)%'
            $storagePublicUrls: '%psychedcms_media.storage_public_urls%'
        tags:
            - { name: 'serializer.normalizer', priority: 64 }

    PsychedCms\Media\Serializer\ImageFieldNormalizer:
        arguments:
            $mediaPublicUrl: '%env(default::MINIO_PUBLIC_URL)%'
            $bucket: '%env(default:psychedcms_media.default_bucket:MINIO_BUCKET)%'
        tags:
            - { name: 'serializer.normalizer', priority: 32 }
